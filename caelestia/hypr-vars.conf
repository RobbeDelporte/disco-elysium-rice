# ~/.config/caelestia/hypr-vars.conf  (symlinked from ~/my-dots/caelestia/)
#
# Sourced by caelestia's hyprland.conf AFTER the upstream defaults in
# $hypr/variables.conf, so anything set here overrides the dots fork.
# Lines below show each tunable variable with its UPSTREAM DEFAULT as a
# comment. Uncomment + tweak the ones you want to change.
#
# Colour variables ($primary, $surface*, $term0-15, ...) are generated
# per-scheme in $hypr/scheme/current.conf and should NOT be overridden here.

# ── Apps ───────────────────────────────────────────────────────────
# $terminal = foot
# $browser = zen-browser
# $editor = codium
# $fileExplorer = thunar

# ── Touchpad ───────────────────────────────────────────────────────
# $touchpadDisableTyping = true
$touchpadScrollFactor = 1.0
# $workspaceSwipeFingers = 4
# $gestureFingers = 3
# $gestureFingersMore = 4

# ── Blur ───────────────────────────────────────────────────────────
# $blurEnabled = true
# $blurSpecialWs = false
# $blurPopups = true
# $blurInputMethods = true
# $blurSize = 8
$blurPasses = 4
# $blurXray = false
 
# ── Shadow ─────────────────────────────────────────────────────────
$shadowEnabled = false
# $shadowRange = 20
$shadowRenderPower = 3
# $shadowColour = rgba($surfaced4)

# ── Gaps ───────────────────────────────────────────────────────────
$workspaceGaps = 6
$windowGapsIn = 2
$windowGapsOut = 6
$singleWindowGapsOut = 6

# ── Window styling ─────────────────────────────────────────────────
$windowOpacity = 0.95
# $windowRounding = 15
# $windowBorderSize = 1
# $activeWindowBorderColour = rgba($primarye6)
# $inactiveWindowBorderColour = rgba($onSurfaceVariant11)

# ── Misc ───────────────────────────────────────────────────────────
# $volumeStep = 10     # percent
# $cursorTheme = sweet-cursors
# $cursorSize = 24

# ── Keybind prefixes (workspaces) ─────────────────────────────────
# $kbMoveWinToWs = Super+Alt
# $kbMoveWinToWsGroup = Ctrl+Super+Alt
# $kbGoToWs = Super
# $kbGoToWsGroup = Ctrl+Super
# $kbNextWs = Ctrl+Super, right
# $kbPrevWs = Ctrl+Super, left
# $kbToggleSpecialWs = Super, S

# ── Keybind prefixes (window groups) ──────────────────────────────
# $kbWindowGroupCycleNext = Alt, Tab
# $kbWindowGroupCyclePrev = Shift+Alt, Tab
# $kbUngroup = Super, U
# $kbToggleGroup = Super, Comma

# ── Keybind prefixes (window actions) ─────────────────────────────
# $kbMoveWindow = Super, Z
# $kbResizeWindow = Super, X
# $kbWindowPip = Super+Alt, Backslash
# $kbPinWindow = Super, P
# $kbWindowFullscreen = Super, F
# $kbWindowBorderedFullscreen = Super+Alt, F
# $kbToggleWindowFloating = Super+Alt, Space
# $kbCloseWindow = Super, Q

# ── Keybind prefixes (special workspaces) ─────────────────────────
# $kbSystemMonitor = Ctrl+Shift, Escape
# $kbMusic = Super, M
# $kbCommunication = Super, D
# $kbTodo = Super, R

# ── Keybind prefixes (apps) ───────────────────────────────────────
# $kbTerminal = Super, T
# $kbBrowser = Super, W
# $kbEditor = Super, C
# $kbFileExplorer = Super, E

# ── Keybind prefixes (misc) ───────────────────────────────────────
