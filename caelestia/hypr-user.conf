# ~/.config/caelestia/hypr-user.conf  (symlinked from ~/my-dots/caelestia/)
#
# Sourced LAST by caelestia's hyprland.conf — overrides every upstream
# directive above it. `monitors-host.conf` is a live symlink that
# scripts/install.sh points at hosts/<hostname>/monitors.conf, so this
# file stays host-agnostic.
#
# For simple variable tweaks ($blurSize, $windowRounding, keybind prefixes,
# ...), prefer hypr-vars.conf. Use THIS file for full directives:
# keybinds, windowrules, exec-once, input overrides, animations, etc.

source = ~/.config/caelestia/monitors-host.conf

# ── Extra keybinds ─────────────────────────────────────────────────
# See https://wiki.hypr.land/Configuring/Binds/ for full syntax.
# bind = Super, Return, exec, $terminal
# bind = Super+Shift, Q, killactive
# bind = Super, Space, exec, fuzzel

# ── Window rules ───────────────────────────────────────────────────
# See https://wiki.hypr.land/Configuring/Window-Rules/
# windowrule = float, class:^(pavucontrol)$
# windowrule = opacity 0.9 override, class:^(foot)$
# windowrule = workspace 2, class:^(zen)$

# ── Layer rules ────────────────────────────────────────────────────
# layerrule = blur, ^(waybar|gtk-layer-shell)$
# layerrule = ignorezero, ^(waybar)$

# ── Startup apps ───────────────────────────────────────────────────
# exec-once = systemctl --user start wireplumber
# exec-once = nm-applet --indicator

# ── Input overrides ────────────────────────────────────────────────
# input {
#     kb_layout = us,be
#     kb_options = grp:alt_shift_toggle
#     repeat_rate = 40
#     repeat_delay = 300
# }

# ── Custom animation curves ────────────────────────────────────────
# bezier = myBezier, 0.05, 0.9, 0.1, 1.05
# animation = windows, 1, 4, myBezier

# ── Per-device input tweaks ────────────────────────────────────────
# device {
#     name = example-mouse
#     sensitivity = -0.3
# }
