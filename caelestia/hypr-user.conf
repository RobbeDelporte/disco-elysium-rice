# ~/.config/caelestia/hypr-user.conf  (symlinked from ~/my-dots/caelestia/)
#
# Sourced LAST by caelestia's hyprland.conf — overrides every upstream
# directive above it. `monitors-host.conf` is a live symlink that
# scripts/install.sh points at hosts/<hostname>/monitors.conf, so this
# file stays host-agnostic.
#
# For simple variable tweaks ($blurSize, $windowRounding, keybind prefixes,
# ...), prefer hypr-vars.conf. Use THIS file for full directives:
# keybinds, windowrules, exec-once, input overrides, animations, etc.

source = ~/.config/caelestia/monitors-host.conf

# ── Extra keybinds ─────────────────────────────────────────────────
# See https://wiki.hypr.land/Configuring/Binds/ for full syntax.
# bind = Super, Return, exec, $terminal
# bind = Super+Shift, Q, killactive
# bind = Super, Space, exec, fuzzel
bind = Super, Escape, global, caelestia:lock

# ── Window rules ───────────────────────────────────────────────────
# See https://wiki.hypr.land/Configuring/Window-Rules/
# windowrule = float, class:^(pavucontrol)$
# windowrule = opacity 0.9 override, class:^(foot)$
# windowrule = workspace 2, class:^(zen)$

# ── Layer rules ────────────────────────────────────────────────────
# layerrule = blur, ^(waybar|gtk-layer-shell)$
# layerrule = ignorezero, ^(waybar)$

# ── Startup apps ───────────────────────────────────────────────────
# exec-once = systemctl --user start wireplumber
# exec-once = nm-applet --indicator

# ── Input overrides ────────────────────────────────────────────────
# Merges into the upstream input block (see caelestia-dots/hypr/hyprland/input.conf).
# Uncomment only the keys you want to change. Trailing comments show the upstream default.
# Full key list: https://wiki.hypr.land/Configuring/Variables/#input
input {
#     # Mouse
    sensitivity = -0.4             # -1.0 … 1.0, 0 = libinput default
    accel_profile = flat           # adaptive | flat | custom
    force_no_accel = false
#     left_handed = false
#     scroll_method = 2fg            # 2fg | edge | on_button_down | no_scroll
#     scroll_factor = 1.0
#     natural_scroll = false
    follow_mouse = 2               # 0 none · 1 always · 2 loose · 3 detached
#     mouse_refocus = true
#     float_switch_override_focus = 1
#
#     # Keyboard (upstream: kb_layout=us, repeat_delay=250, repeat_rate=35)
#     kb_layout = us,be
#     kb_options = grp:alt_shift_toggle
#     repeat_rate = 35
#     repeat_delay = 250
#
#     touchpad {
#         # upstream: natural_scroll=true, disable_while_typing=$touchpadDisableTyping (true),
#         #           scroll_factor=$touchpadScrollFactor (0.3)
#         clickfinger_behavior = true
#         middle_button_emulation = false
#         tap-to-click = true
#         drag_lock = false
#     }
}

# ── Cursor ─────────────────────────────────────────────────────────
# cursor {
#     no_hardware_cursors = false
#     inactive_timeout = 0           # seconds, 0 = never hide
#     hotspot_padding = 1            # upstream default
# }

# ── Animations ─────────────────────────────────────────────────────
# Upstream animations live in caelestia-dots/hypr/hyprland/animations.conf
# and are sourced BEFORE this file, so re-declaring an `animation = <key>, ...`
# line here overrides just that key (the rest stay upstream).
# Upstream bezier names available for reuse: standard, emphasizedAccel,
# emphasizedDecel, specialWorkSwitch.
# Full syntax: https://wiki.hypr.land/Configuring/Animations/
#
# Disable all animations:
# animations { enabled = false }
#
# Upstream defaults (uncomment + tweak to override a single key):
animation = layersIn,         1, 2.5, emphasizedDecel, slide
animation = layersOut,        1, 2, emphasizedAccel, slide
animation = fadeLayers,       1, 2.5, standard
animation = windowsIn,        1, 2.5, emphasizedDecel
animation = windowsOut,       1, 1.5, emphasizedAccel
animation = windowsMove,      1, 3, standard
animation = workspaces,       1, 2.5, standard
animation = specialWorkspace, 1, 2, specialWorkSwitch, slidefadevert 15%
animation = fade,             1, 3, standard
animation = fadeDim,          1, 3, standard
animation = border,           1, 3, standard
#
# Custom bezier + animation example:
# bezier = myBezier, 0.05, 0.9, 0.1, 1.05
# animation = windowsIn, 1, 4, myBezier

# ── Per-device input tweaks ────────────────────────────────────────
# Find device names with:   hyprctl devices
device {
    name = uniw0001:00-093a:0255-touchpad
    sensitivity = -0.1
    accel_profile = adaptive
}
