# =============================================
# Kitty Configuration — Minimal Shell
# =============================================

# Font
font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12

# Cursor
cursor_shape beam
cursor_blink_interval 0.5

# Scrollback
scrollback_lines 10000

# Window
window_padding_width 8
confirm_os_window_close 0
enable_audio_bell no

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 1
active_tab_foreground #171b1a
active_tab_background #d2d2d2
active_tab_font_style bold
inactive_tab_foreground #d2d2d2
inactive_tab_background #363b3a
tab_bar_background #1e2221

# URLs
url_style curly
detect_urls yes

# Performance
repaint_delay 6
input_delay 1
sync_to_monitor yes

# Wayland
wayland_titlebar_color system

# Colors — Disco Elysium
background #1e2221
foreground #ccc8c2
cursor #ccc8c2
cursor_text_color #171b1a
selection_foreground #171b1a
selection_background #5bc0d6

# Normal colors
color0  #171b1a
color1  #cb456a
color2  #0fb666
color3  #e3ba3e
color4  #5bc0d6
color5  #7555c6
color6  #4ba89a
color7  #ccc8c2

# Bright colors
color8  #363b3a
color9  #eb6408
color10 #3dcc88
color11 #eece6e
color12 #89d4e5
color13 #9a7ed6
color14 #89d4e5
color15 #ebdbb2
