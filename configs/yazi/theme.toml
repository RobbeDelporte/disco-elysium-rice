# Disco Elysium theme for Yazi — based on default dark theme
# Only color values changed, all structure preserved.
"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

# vim:fileencoding=utf-8:foldmethod=marker

# : Flavor {{{

[flavor]
dark  = ""
light = ""

# : }}}


# : App {{{

[app]
overall = {}

# : }}}


# : Manager {{{

[mgr]
cwd = { fg = "#ccc8c2" }

# Find
find_keyword  = { fg = "#eb6408", bold = true, italic = true, underline = true }
find_position = { fg = "#999a95", bg = "reset", bold = true, italic = true }

# Symlink
symlink_target = { italic = true }

# Marker
marker_copied   = { fg = "#999a95",  bg = "#999a95" }
marker_cut      = { fg = "#b83a3a",  bg = "#b83a3a" }
marker_marked   = { fg = "#eb6408",  bg = "#eb6408" }
marker_selected = { fg = "#eb6408",  bg = "#eb6408" }
marker_symbol   = " "

# Count
count_copied   = { fg = "#ccc8c2", bg = "#363b3a" }
count_cut      = { fg = "#ccc8c2", bg = "#b83a3a" }
count_selected = { fg = "#171b1a", bg = "#eb6408" }

# Border
border_symbol = "│"
border_style  = { fg = "#363b3a" }

# Highlighting
syntect_theme = ""

# : }}}


# : Tabs {{{

[tabs]
active   = { bg = "#282c2b", bold = true }
inactive = { fg = "#999a95", bg = "#1e2221" }

# Separator
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# : }}}


# : Mode {{{

[mode]
normal_main = { bg = "#282c2b", bold = true }
normal_alt  = { fg = "#999a95", bg = "#1e2221" }

# Select mode
select_main = { fg = "#171b1a", bg = "#eb6408", bold = true }
select_alt  = { fg = "#eb6408", bg = "#1e2221" }

# Unset mode
unset_main = { bg = "#363b3a", bold = true }
unset_alt  = { fg = "#999a95", bg = "#1e2221" }

# : }}}


# : Indicator of hovered file {{{

[indicator]
parent  = { reversed = true }
current = { reversed = true }
preview = { underline = true }
padding = { open = "", close = "" }

# : }}}


# : Status bar {{{

[status]
overall   = {}
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Permissions
perm_sep   = { fg = "#363b3a" }
perm_type  = { fg = "#999a95" }
perm_read  = { fg = "#999a95" }
perm_write = { fg = "#999a95" }
perm_exec  = { fg = "#999a95" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#999a95", bg = "#171b1a" }
progress_error  = { fg = "#e3ba3e", bg = "#b83a3a" }

# : }}}


# : Which {{{

[which]
cols            = 3
mask            = { bg = "#171b1a" }
cand            = { fg = "#ccc8c2" }
rest            = { fg = "#4b4b4b" }
desc            = { fg = "#999a95" }
separator       = "  "
separator_style = { fg = "#363b3a" }

# : }}}


# : Confirmation {{{

[confirm]
border     = { fg = "#363b3a" }
title      = { fg = "#ccc8c2" }
body       = {}
list       = {}
btn_yes    = { reversed = true }
btn_no     = {}
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

# : }}}


# : Spotter {{{

[spot]
border = { fg = "#363b3a" }
title  = { fg = "#ccc8c2" }

# Table
tbl_col  = { fg = "#999a95" }
tbl_cell = { fg = "#ccc8c2", reversed = true }

# : }}}


# : Notification {{{

[notify]
title_info  = { fg = "#ccc8c2" }
title_warn  = { fg = "#e3ba3e" }
title_error = { fg = "#b83a3a" }

# Icons
icon_info  = ""
icon_warn  = ""
icon_error = ""

# : }}}


# : Picker {{{

[pick]
border   = { fg = "#363b3a" }
active   = { fg = "#ccc8c2", bold = true }
inactive = {}

# : }}}


# : Input {{{

[input]
border   = { fg = "#363b3a" }
title    = {}
value    = {}
selected = { reversed = true }

# : }}}


# : Completion {{{

[cmp]
border   = { fg = "#363b3a" }
active   = { reversed = true }
inactive = {}

# Icons
icon_file    = ""
icon_folder  = ""
icon_command = ""

# : }}}


# : Task manager {{{

[tasks]
border  = { fg = "#363b3a" }
title   = {}
hovered = { fg = "#ccc8c2", bold = true }

# : }}}


# : Help menu {{{

[help]
on      = { fg = "#ccc8c2" }
run     = { fg = "#999a95" }
desc    = {}
hovered = { reversed = true, bold = true }
footer  = { fg = "#171b1a", bg = "#ccc8c2" }

# : }}}


# : File-specific styles {{{

[filetype]
rules = [
	# Image
	{ mime = "image/*", fg = "#ccc8c2" },
	# Media
	{ mime = "{audio,video}/*", fg = "#ccc8c2" },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#999a95" },
	# Document
	{ mime = "application/{pdf,doc,rtf}", fg = "#ccc8c2" },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", fg = "#4b4b4b" },
	# Special file
	{ url = "*", is = "orphan", bg = "#b83a3a" },
	{ url = "*", is = "exec"  , fg = "#0fb666" },
	# Dummy file
	{ url = "*", is = "dummy", bg = "#b83a3a" },
	{ url = "*/", is = "dummy", bg = "#b83a3a" },
	# Fallback
	{ url = "*/", fg = "#ccc8c2" }
]

# : }}}


# : Icons — mute the default blue directory icons {{{

[icon]
prepend_conds = [
	{ if = "dir", text = "", fg = "#999a95" },
]
prepend_dirs = [
	{ name = ".config", text = "", fg = "#999a95" },
	{ name = ".git", text = "", fg = "#999a95" },
	{ name = ".github", text = "", fg = "#999a95" },
	{ name = ".npm", text = "", fg = "#999a95" },
	{ name = "Desktop", text = "", fg = "#999a95" },
	{ name = "Development", text = "", fg = "#999a95" },
	{ name = "Documents", text = "", fg = "#999a95" },
	{ name = "Downloads", text = "", fg = "#999a95" },
	{ name = "Library", text = "", fg = "#999a95" },
	{ name = "Movies", text = "", fg = "#999a95" },
	{ name = "Music", text = "", fg = "#999a95" },
	{ name = "Pictures", text = "", fg = "#999a95" },
	{ name = "Public", text = "", fg = "#999a95" },
	{ name = "Videos", text = "", fg = "#999a95" },
	{ name = "node_modules", text = "", fg = "#999a95" },
]

# : }}}
