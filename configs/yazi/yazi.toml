# Yazi core configuration
# See: https://yazi-rs.github.io/docs/configuration/yazi

[manager]
ratio = [1, 3, 4]
sort_by = "alphabetical"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = false
show_symlink = true

[preview]
max_width = 1000
max_height = 1000
image_delay = 30

[opener]
edit = [
    { run = '$EDITOR "$@"', block = true, for = "unix" },
]
open = [
    { run = 'xdg-open "$@"', desc = "Open" },
]
image = [
    { run = 'imv "$@"', desc = "imv", for = "unix" },
]
pdf = [
    { run = 'zathura "$@"', desc = "zathura", for = "unix" },
]
archive = [
    { run = 'xdg-open "$@"', desc = "Extract", for = "unix" },
]

[open]
rules = [
    { mime = "text/*", use = "edit" },
    { mime = "image/*", use = "image" },
    { mime = "application/pdf", use = "pdf" },
    { mime = "application/zip", use = "archive" },
    { mime = "application/gzip", use = "archive" },
    { mime = "application/x-tar", use = "archive" },
    { mime = "application/x-bzip2", use = "archive" },
    { mime = "application/x-xz", use = "archive" },
    { mime = "application/x-zstd", use = "archive" },
    { mime = "application/x-rar", use = "archive" },
    { mime = "application/x-7z-compressed", use = "archive" },
    { name = "*.json", use = "edit" },
    { name = "*.toml", use = "edit" },
    { name = "*.yaml", use = "edit" },
    { name = "*.yml", use = "edit" },
    { name = "*.md", use = "edit" },
    { name = "*.conf", use = "edit" },
    { name = "*.sh", use = "edit" },
    { name = "*.zsh", use = "edit" },
    { name = "*.lua", use = "edit" },
    { name = "*.ts", use = "edit" },
    { name = "*.tsx", use = "edit" },
    { name = "*.scss", use = "edit" },
    { name = "*.css", use = "edit" },
    { mime = "*", use = "open" },
]
