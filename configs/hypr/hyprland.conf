# =============================================
# Hyprland Configuration — Minimal Shell
# =============================================

# Source host-specific monitor config
source = ~/.config/hypr/monitors.conf

# =============================================
# Environment Variables
# =============================================
env = XCURSOR_THEME,Nordzy-cursors
env = XCURSOR_SIZE,32
env = HYPRCURSOR_THEME,Nordzy-cursors
env = HYPRCURSOR_SIZE,32
env = PATH,$HOME/.local/bin:$PATH
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# =============================================
# Autostart
# =============================================
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent
exec-once = sh -c 'while true; do GSK_RENDERER=ngl disco-shell 2>>/tmp/disco-shell.log; pkill -P $$ -x disco-shell 2>/dev/null; sleep 0.5; done'
exec-once = awww-daemon && sleep 0.5 && awww img ~/disco-elysium-rice/wallpapers/martinaise.png --transition-type fade --transition-duration 1
exec-once = udiskie
exec-once = nm-applet
exec-once = blueman-applet
exec-once = hypridle
exec-once = wl-paste --watch cliphist store
exec-once = ~/disco-elysium-rice/scripts/monitor-hotplug.sh

# =============================================
# General
# =============================================
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1 
    col.active_border = rgba(4b4b4bff)
    col.inactive_border = rgba(171b1aff)
    layout = dwindle
}

# =============================================
# Input
# =============================================
input {
    kb_layout = us
    follow_mouse = 2
    sensitivity = -0.95
    touchpad {
        natural_scroll = true
    }
}

# Per-device: touchpad sensitivity (independent from mouse)
device {
    name = elan0412:00-04f3:3240-touchpad
    sensitivity = 0.0
}

# =============================================
# Decoration
# =============================================
decoration {
    rounding = 2
    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
        xray = false
    }
    shadow {
        enabled = false
    }
}

# =============================================
# Animations
# =============================================
animations {
    enabled = true
    bezier = disco, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 1, disco, slide
    animation = windowsOut, 0
    animation = fade, 1, 1, disco
    animation = workspaces, 1, 1, disco, slide
    animation = specialWorkspace, 0
}

# =============================================
# Layout
# =============================================
dwindle {
    pseudotile = true
    preserve_split = true
}

# =============================================
# XWayland
# =============================================
xwayland {
    force_zero_scaling = true
}

# =============================================
# Misc
# =============================================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# =============================================
# Layer Rules — disco-shell blur
# =============================================
layerrule = match:namespace = launcher, animation slide 0

# =============================================
# Window Rules
# =============================================
windowrule = float on, match:class pavucontrol
windowrule = float on, match:class blueman-manager
windowrule = float on, match:class nm-connection-editor
windowrule = float on, match:class nwg-displays
windowrule = float on, match:title Open File
windowrule = float on, match:title Save As
windowrule = float on, match:class xdg-desktop-portal-gtk
windowrule = float on, match:class org.freedesktop.impl.portal.desktop.gtk
windowrule = float on, match:title Picture-in-Picture
windowrule = pin on, match:title Picture-in-Picture
windowrule = size 640 360, match:title Picture-in-Picture
windowrule = move 100%-650 100%-370, match:title Picture-in-Picture

# Music control centre
windowrule = float on, match:class disco-music
windowrule = size 220 260, match:class disco-music
windowrule = move center, match:class disco-music

# =============================================
# Keybinds
# =============================================
$mod = SUPER

# App launchers
bind = $mod, Return, exec, kitty
bind = $mod, T, exec, kitty
bind = $mod, D, exec, disco-shell toggle launcher
bind = $mod, slash, exec, disco-shell toggle launcher
bind = $mod, E, exec, kitty -e yazi
bind = ALT, Tab, exec, disco-shell toggle switcher
bind = $mod, O, exec, disco-shell toggle overview
bind = $mod, M, exec, disco-shell toggle-music

# Window management
bind = $mod, Q, killactive
bind = $mod, V, togglefloating
bind = $mod, F, fullscreen, 0
bind = $mod, P, pseudo
bind = $mod SHIFT, T, exec, kitty -e nvim

# Focus (vim keys)
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Focus (arrow keys)
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Move windows (vim keys)
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# Move windows (arrow keys)
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Resize (vim keys)
bind = $mod CTRL, h, resizeactive, -40 0
bind = $mod CTRL, l, resizeactive, 40 0
bind = $mod CTRL, k, resizeactive, 0 -40
bind = $mod CTRL, j, resizeactive, 0 40

# Resize (arrow keys)
bind = $mod CTRL, left, resizeactive, -40 0
bind = $mod CTRL, right, resizeactive, 40 0
bind = $mod CTRL, up, resizeactive, 0 -40
bind = $mod CTRL, down, resizeactive, 0 40

# Workspaces (also dismiss scratchpad if open)
bind = $mod, 1, exec, ~/disco-elysium-rice/scripts/workspace.sh 1
bind = $mod, 2, exec, ~/disco-elysium-rice/scripts/workspace.sh 2
bind = $mod, 3, exec, ~/disco-elysium-rice/scripts/workspace.sh 3
bind = $mod, 4, exec, ~/disco-elysium-rice/scripts/workspace.sh 4
bind = $mod, 5, exec, ~/disco-elysium-rice/scripts/workspace.sh 5
bind = $mod, 6, exec, ~/disco-elysium-rice/scripts/workspace.sh 6

# Move to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6

# Default workspace → monitor hints
workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:eDP-1, default:true
workspace = 3, monitor:eDP-1, default:true
workspace = 4, monitor:HDMI-A-1, default:true
workspace = 5, monitor:HDMI-A-1, default:true
workspace = 6, monitor:HDMI-A-1, default:true

# Move window to other monitor
bind = $mod ALT, h, movewindow, mon:l
bind = $mod ALT, l, movewindow, mon:r
bind = $mod ALT, left, movewindow, mon:l
bind = $mod ALT, right, movewindow, mon:r

# Move workspace to other monitor
bind = $mod ALT SHIFT, h, movecurrentworkspacetomonitor, l
bind = $mod ALT SHIFT, l, movecurrentworkspacetomonitor, r
bind = $mod ALT SHIFT, left, movecurrentworkspacetomonitor, l
bind = $mod ALT SHIFT, right, movecurrentworkspacetomonitor, r

# Scratchpad
bind = $mod, grave, togglespecialworkspace, magic
bind = $mod SHIFT, grave, movetoworkspace, special:magic

# Screenshots
bind = $mod, S, exec, grimblast copy area
bind = $mod SHIFT, S, exec, grimblast copy screen

# Clipboard history
bind = $mod SHIFT, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# Notification center
bind = $mod, N, exec, disco-shell toggle quicksettings

# Lock screen
bind = SUPER, Escape, exec, hyprlock
bind = $mod SHIFT, E, exec, disco-shell toggle powermenu

# Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Volume
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Media
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Mouse binds
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
bindm = $mod CTRL, mouse:272, resizewindow
