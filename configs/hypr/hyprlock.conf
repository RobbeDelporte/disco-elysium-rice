# =============================================
# Hyprlock Configuration — Disco Elysium
# =============================================

general {
    grace = 5
    hide_cursor = true
}

animations {
    enabled = true
    bezier = fastFade, 0.0, 0.0, 0.2, 1.0
    animation = fadeIn, 1, 1, fastFade
    animation = fadeOut, 0
    animation = inputFieldColors, 0
    animation = inputFieldDots, 1, 2, fastFade
}

background {
    path = ~/disco-elysium-rice/wallpapers/martinaise.png
    blur_passes = 3
    blur_size = 6
    brightness = 0.5
}

input-field {
    size = 280, 48
    outline_thickness = 1
    rounding = 2
    dots_size = 0.25
    dots_spacing = 0.2
    fade_on_empty = false
    font_family = Libre Baskerville
    placeholder_text = <i>Password...</i>
    fail_text = <span size="x-small">$FAIL</span>
    position = 0, -40
    halign = center
    valign = center
    outer_color = rgb(54, 59, 58)
    inner_color = rgba(171b1ab3)
    font_color = rgb(210, 210, 210)
    check_color = rgb(15, 182, 102)
    fail_color = rgb(184, 58, 58)
    capslock_color = rgb(227, 186, 62)
}

# Time
label {
    text = cmd[update:1000] echo "$(date +%H:%M)"
    font_size = 96
    font_family = Playfair Display
    position = 0, 120
    halign = center
    valign = center
    color = rgb(210, 210, 210)
}

# Date
label {
    text = cmd[update:60000] echo "$(date +"%A, %d %B")" | tr '[:lower:]' '[:upper:]'
    font_size = 16
    font_family = Open Sans Condensed
    position = 0, 40
    halign = center
    valign = center
    color = rgb(153, 154, 149)
}
