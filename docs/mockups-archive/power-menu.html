<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Menu — Mockup v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans+Condensed:wght@300;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0f0e;
    color: #ccc8c2;
    font-family: 'JetBrains Mono', monospace;
    padding: 40px;
    min-height: 100vh;
  }

  h2 {
    font-family: 'Open Sans Condensed', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 14px;
    color: #4b4b4b;
    margin-bottom: 24px;
  }

  .description {
    font-family: 'Libre Baskerville', serif;
    font-size: 13px;
    color: #999a95;
    line-height: 1.7;
    max-width: 800px;
    margin-bottom: 32px;
  }

  .label {
    font-family: 'Open Sans Condensed', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 11px;
    color: #4b4b4b;
    margin: 40px 0 16px;
  }

  .overlay {
    background: linear-gradient(135deg, #2a1f18 0%, #1a2028 30%, #3a2818 60%, #171b1a 100%);
    border-radius: 4px;
    position: relative;
    min-height: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .overlay::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(16, 19, 18, 0.65);
    border-radius: 4px;
  }

  .power-menu {
    position: relative;
    z-index: 1;
    width: 280px;
  }

  .pm-title {
    display: inline-block;
    position: relative;
    margin-bottom: -1px;
    margin-left: -8px;
  }
  .pm-title .bg {
    position: absolute;
    inset: 0;
    background: #d2d2d2;
    filter: url(#ea);
  }
  .pm-title .text {
    position: relative;
    z-index: 1;
    font-family: 'Open Sans Condensed', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #171b1a;
    padding: 3px 10px 3px 8px;
    font-size: 16px;
  }

  .pm-body {
    background: rgba(23, 27, 26, 0.92);
    border: 1px solid rgba(54, 59, 58, 0.4);
    padding: 10px 8px;
  }

  .pm-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    margin: 2px 0;
    cursor: pointer;
    transition: background 0.15s ease;
    font-family: 'Open Sans Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #ccc8c2;
  }
  .pm-item:hover {
    background: #282c2b;
  }
  .pm-item.selected {
    background: #d2d2d2;
    color: #171b1a;
    padding: 5px 12px;
    margin: 5px 0;
  }
  .pm-item.selected .pm-icon { stroke: #171b1a; }

  .pm-item.danger {
    color: #999a95;
  }
  .pm-item.danger:hover {
    color: #ccc8c2;
  }
  .pm-item.danger.selected {
    background: #d2d2d2;
    color: #171b1a;
  }

  .pm-icon {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    stroke-width: 1.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }

  .pm-divider {
    height: 1px;
    background: rgba(54, 59, 58, 0.3);
    margin: 4px 12px;
  }

  .pm-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #363b3a;
    text-align: right;
    padding: 8px 12px 2px;
  }

  svg.filters { position: absolute; width: 0; height: 0; }
</style>
</head>
<body>

<svg class="filters" xmlns="http://www.w3.org/2000/svg"><defs>
  <filter id="ea" x="-1%" y="-5%" width="103%" height="112%"><feTurbulence type="fractalNoise" baseFrequency="0.12" numOctaves="4" seed="13" result="n"/><feComponentTransfer in="n" result="b"><feFuncA type="discrete" tableValues="0 0 0 1 1 1 1 1"/></feComponentTransfer><feMorphology in="SourceAlpha" operator="erode" radius="0.6" result="i"/><feComposite in="SourceAlpha" in2="i" operator="out" result="e"/><feComposite in="e" in2="b" operator="in" result="r"/><feComposite in="SourceGraphic" in2="i" operator="in" result="s"/><feComposite in="SourceGraphic" in2="r" operator="in" result="c"/><feMerge><feMergeNode in="s"/><feMergeNode in="c"/></feMerge></filter>
</defs></svg>

<h2>Mockup 9 / 9 — Power Menu (v2)</h2>
<p class="description">Updated: Selection banner is narrower (reduced vertical padding) with more space between items, so it floats as a tight highlight rather than filling the full row height.</p>

<div class="label">"Suspend" selected</div>
<div class="overlay">
  <div class="power-menu">
    <div class="pm-title">
      <div class="bg"></div>
      <div class="text">Session</div>
    </div>
    <div class="pm-body">
      <div class="pm-item">
        <svg class="pm-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Lock
      </div>
      <div class="pm-item selected">
        <svg class="pm-icon" viewBox="0 0 24 24"><path d="M17 8l4 4-4 4"/><path d="M3 12h18"/><path d="M3 6h6"/><path d="M3 18h6"/></svg>
        Suspend
      </div>
      <div class="pm-item">
        <svg class="pm-icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </div>
      <div class="pm-divider"></div>
      <div class="pm-item danger">
        <svg class="pm-icon" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Reboot
      </div>
      <div class="pm-item danger">
        <svg class="pm-icon" viewBox="0 0 24 24"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
        Shutdown
      </div>
      <div class="pm-hint">esc to cancel</div>
    </div>
  </div>
</div>

</body>
</html>
