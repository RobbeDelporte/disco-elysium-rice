<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Power Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;700&family=Libre+Baskerville&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;min-height:100vh;background:linear-gradient(170deg,#3a2418 0%,#5a2a12 35%,#2a1a14 70%,#0e0a08 100%);font-family:'Archivo Narrow',sans-serif;color:#ccc8c2;overflow:hidden;">

<!-- Full-screen dark overlay -->
<div style="position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:10;"></div>

<!-- Top film edge (real film-tape asset, flipped vertically) -->
<div style="position:fixed;top:0;left:0;right:0;height:96px;z-index:11;
            background-image:url('../../../assets/textures/film-tape-bottom.png');
            background-repeat:repeat-x;
            background-size:auto 96px;
            transform:scaleY(-1);"></div>

<!-- Bottom film edge (normal orientation) -->
<div style="position:fixed;bottom:0;left:0;right:0;height:96px;z-index:11;
            background-image:url('../../../assets/textures/film-tape-bottom.png');
            background-repeat:repeat-x;
            background-size:auto 96px;"></div>

<!-- Center panel: solid dark with banner overhang -->
<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:12;
            width:400px;padding:28px 26px 22px 26px;
            background:#0e1110;
            border:1px solid rgba(54,59,58,0.7);
            box-shadow:0 12px 48px rgba(0,0,0,0.85);
            display:flex;flex-direction:column;">

  <!-- Banner overhang -->
  <span style="position:absolute;top:-14px;left:-10px;background:#d2d2d2;color:#171b1a;padding:4px 20px 5px 20px;font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:4px;clip-path:polygon(0% 8%,3% 0%,98% 4%,100% 95%,97% 100%,2% 96%);">END SESSION</span>

  <!-- Options -->
  <div style="display:flex;flex-direction:column;gap:4px;margin-top:16px;">

    <div style="display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:14px;padding:12px 14px;background:rgba(40,44,43,0.55);border-left:3px solid #eb6408;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#eb6408" stroke-width="1.8" stroke-linecap="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
      <span>
        <div style="font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:3px;color:#ccc8c2;">Shut Down</div>
        <div style="font-family:'Libre Baskerville',serif;font-size:11px;color:#999a95;margin-top:2px;">Power off the machine.</div>
      </span>
      <span style="color:#eb6408;font-size:14px;">↵</span>
    </div>

    <div style="display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:14px;padding:12px 14px;border-left:3px solid transparent;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999a95" stroke-width="1.8" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      <span>
        <div style="font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:3px;color:#ccc8c2;">Restart</div>
        <div style="font-family:'Libre Baskerville',serif;font-size:11px;color:#999a95;margin-top:2px;">Reboot and return.</div>
      </span>
    </div>

    <div style="display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:14px;padding:12px 14px;border-left:3px solid transparent;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999a95" stroke-width="1.8" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span>
        <div style="font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:3px;color:#ccc8c2;">Suspend</div>
        <div style="font-family:'Libre Baskerville',serif;font-size:11px;color:#999a95;margin-top:2px;">Sleep the machine; resume later.</div>
      </span>
    </div>

    <div style="display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:14px;padding:12px 14px;border-left:3px solid transparent;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999a95" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/></svg>
      <span>
        <div style="font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:3px;color:#ccc8c2;">Hibernate</div>
        <div style="font-family:'Libre Baskerville',serif;font-size:11px;color:#999a95;margin-top:2px;">Write state to disk; power off.</div>
      </span>
    </div>

    <div style="display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:14px;padding:12px 14px;border-left:3px solid transparent;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999a95" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>
        <div style="font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:3px;color:#ccc8c2;">Lock</div>
        <div style="font-family:'Libre Baskerville',serif;font-size:11px;color:#999a95;margin-top:2px;">Stay logged in; lock the screen.</div>
      </span>
    </div>

    <div style="display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:14px;padding:12px 14px;border-left:3px solid transparent;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999a95" stroke-width="1.8" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>
        <div style="font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:3px;color:#ccc8c2;">Log Out</div>
        <div style="font-family:'Libre Baskerville',serif;font-size:11px;color:#999a95;margin-top:2px;">End Hyprland session.</div>
      </span>
    </div>

  </div>

  <div style="flex:1;"></div>

  <div style="padding-top:10px;border-top:1px solid rgba(54,59,58,0.5);font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:3px;color:#999a95;text-align:center;">ESC to cancel</div>

</div>

</body>
</html>
