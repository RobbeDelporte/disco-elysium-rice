<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Launcher</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;700&family=Libre+Baskerville&family=JetBrains+Mono:wght@400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;min-height:100vh;background:linear-gradient(170deg,#3a2418 0%,#5a2a12 35%,#2a1a14 70%,#0e0a08 100%);font-family:'Archivo Narrow',sans-serif;color:#ccc8c2;overflow:hidden;">

<!-- Launcher, right-anchored, width from content (here 280px placeholder) -->
<div style="position:fixed;top:0;right:0;width:280px;height:100vh;overflow:hidden;
            background-image:url('../../../assets/textures/page-bg.png');
            background-repeat:repeat-y;
            background-size:280px auto;
            border-left:1px solid rgba(54,59,58,0.6);">

  <div style="position:absolute;inset:0;background:rgba(14,17,16,0.32);"></div>

  <div style="position:relative;padding:22px 16px 16px 16px;box-sizing:border-box;height:100%;display:flex;flex-direction:column;overflow-y:auto;">

    <!-- Banner: current mode -->
    <span style="position:absolute;top:-8px;right:-6px;background:#d2d2d2;color:#171b1a;padding:3px 14px 4px 14px;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:3px;clip-path:polygon(2% 4%,97% 0%,100% 92%,98% 100%,3% 96%,0% 8%);">LAUNCH</span>

    <!-- Mode icon row: LAUNCH (windows+apps merged) / CLIPBOARD / CALC / FILES / BASH -->
    <div style="display:flex;justify-content:space-around;align-items:center;margin-top:14px;padding:6px 4px;border:1px solid rgba(54,59,58,0.5);background:rgba(10,12,11,0.4);">
      <!-- launch (windows + apps, active) -->
      <span title="launch" style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:24px;border-bottom:2px solid #eb6408;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#d2d2d2" stroke-width="1.8" stroke-linecap="round"><path d="M12 2l3 6 6 1-4.5 4 1 6-5.5-3-5.5 3 1-6L3 9l6-1z"/></svg>
      </span>
      <!-- clipboard -->
      <span title="clipboard" style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:24px;border-bottom:2px solid transparent;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#999a95" stroke-width="1.8" stroke-linecap="round"><rect x="5" y="4" width="14" height="17" rx="1"/><rect x="9" y="2" width="6" height="4" rx="1"/></svg>
      </span>
      <!-- calculator -->
      <span title="calculator" style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:24px;border-bottom:2px solid transparent;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#999a95" stroke-width="1.8" stroke-linecap="round"><rect x="4" y="3" width="16" height="18" rx="1"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="13" x2="9" y2="13"/><line x1="12" y1="13" x2="13" y2="13"/><line x1="16" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="9" y2="17"/><line x1="12" y1="17" x2="13" y2="17"/><line x1="16" y1="17" x2="16" y2="17"/></svg>
      </span>
      <!-- files -->
      <span title="files" style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:24px;border-bottom:2px solid transparent;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#999a95" stroke-width="1.8" stroke-linecap="round"><path d="M3 6a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      </span>
      <!-- bash -->
      <span title="bash" style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:24px;border-bottom:2px solid transparent;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#999a95" stroke-width="1.8" stroke-linecap="round"><polyline points="5 9 9 12 5 15"/><line x1="12" y1="17" x2="18" y2="17"/></svg>
      </span>
    </div>

    <!-- Search input -->
    <div style="margin-top:14px;padding:6px 0;border-bottom:1px solid #363b3a;display:flex;align-items:baseline;gap:8px;">
      <span style="color:#eb6408;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;">&gt;</span>
      <span style="color:#ccc8c2;font-family:'JetBrains Mono',monospace;font-size:13px;">fire<span style="display:inline-block;width:7px;height:14px;background:#eb6408;vertical-align:-2px;margin-left:1px;animation:blink 1s steps(1) infinite;"></span></span>
    </div>

    <!-- Results list -->
    <div style="margin-top:10px;display:flex;flex-direction:column;">

      <!-- Group label: WINDOWS -->
      <div style="font-weight:700;font-size:8px;text-transform:uppercase;letter-spacing:3px;color:#7555c6;padding:4px 0 2px 3px;">WINDOWS</div>

      <!-- selected: running window -->
      <div style="display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:8px;padding:7px 6px 7px 3px;margin:0 -6px;border-left:3px solid #eb6408;background:rgba(40,44,43,0.55);">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:#912711;color:#ebdbb2;font-weight:700;font-size:14px;">F</span>
        <span>
          <div style="font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#ccc8c2;">Firefox — github.com</div>
          <div style="font-family:'Libre Baskerville',serif;font-size:10px;color:#999a95;">Workspace 2 · open now</div>
        </span>
        <span style="color:#eb6408;font-size:12px;">↵</span>
      </div>

      <div style="display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:8px;padding:7px 6px 7px 3px;margin:0 -6px;border-left:3px solid transparent;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:#1e2221;color:#999a95;font-weight:700;font-size:14px;">F</span>
        <span>
          <div style="font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#ccc8c2;">Firefox — nvim.io</div>
          <div style="font-family:'Libre Baskerville',serif;font-size:10px;color:#999a95;">Workspace 3 · open now</div>
        </span>
      </div>

      <!-- Group label: APPS -->
      <div style="font-weight:700;font-size:8px;text-transform:uppercase;letter-spacing:3px;color:#e3ba3e;padding:10px 0 2px 3px;">APPS</div>

      <div style="display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:8px;padding:7px 6px 7px 3px;margin:0 -6px;border-left:3px solid transparent;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:#1e2221;color:#999a95;font-weight:700;font-size:14px;">F</span>
        <span>
          <div style="font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#ccc8c2;">Firefox Developer Edition</div>
          <div style="font-family:'Libre Baskerville',serif;font-size:10px;color:#999a95;">Web browser — dev build</div>
        </span>
      </div>

      <div style="display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:8px;padding:7px 6px 7px 3px;margin:0 -6px;border-left:3px solid transparent;">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:#1e2221;color:#999a95;font-weight:700;font-size:14px;">f</span>
        <span>
          <div style="font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#ccc8c2;">FireShot</div>
          <div style="font-family:'Libre Baskerville',serif;font-size:10px;color:#999a95;">Screen capture utility</div>
        </span>
      </div>

    </div>

  </div>
</div>

<style>
  @keyframes blink { 50% { opacity: 0; } }
</style>

</body>
</html>
