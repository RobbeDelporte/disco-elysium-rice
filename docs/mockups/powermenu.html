<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Menu — disco-shell</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700&family=Open+Sans+Condensed:wght@300;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e0f0e; color: #ccc8c2; font-family: 'JetBrains Mono', monospace; min-height: 100vh; overflow-x: hidden; }

  .desktop {
    width: calc(100% - 48px); margin: 24px;
    height: 650px; position: relative;
    border-radius: 4px; overflow: hidden;
    background-image: url('../../wallpapers/martinaise.png');
    background-size: cover; background-position: center 20%;
  }

  /* ── Status bar ── */
  .bar { position: absolute; top: 0; left: 0; right: 0; height: 36px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 8px; z-index: 10; background: rgba(10,12,11,0.78); backdrop-filter: blur(20px); border-bottom: 2px solid rgba(210,210,210,0.18); }
  .bar-left { display: flex; align-items: center; } .bar-center { display: flex; justify-content: center; align-items: center; } .bar-right { display: flex; justify-content: flex-end; align-items: center; }
  .ws-diamond { padding: 0 7px; display: flex; align-items: center; } .ws-diamond .diamond { width: 7px; height: 7px; background: #4b4b4b; transform: rotate(45deg); } .ws-diamond.active .diamond { background: #d2d2d2; box-shadow: 0 0 5px rgba(210,210,210,0.35); }
  .ws-well { background: rgba(16,19,18,0.45); border-left: 1px solid rgba(54,59,58,0.20); border-right: 1px solid rgba(54,59,58,0.20); border-top: none; border-bottom: none; display: flex; align-items: center; height: 36px; padding: 0 4px; }
  .sep-light-v { width: 1px; height: 36px; background: linear-gradient(180deg, rgba(210,210,210,0.0) 0%, rgba(210,210,210,0.12) 30%, rgba(210,210,210,0.12) 70%, rgba(210,210,210,0.0) 100%); margin: 0 10px; flex-shrink: 0; }
  .window-title { font-family: 'Libre Baskerville', serif; font-weight: 500; font-size: 11px; color: #999a95; padding: 0 6px; }
  .clock { font-family: 'Open Sans', sans-serif; font-weight: 300; font-size: 14px; letter-spacing: 1.5px; text-transform: uppercase; color: #ccc8c2; }
  .clock-ornament { display: flex; align-items: center; gap: 10px; }
  .clock-line { width: 30px; height: 1px; background: linear-gradient(90deg, rgba(210,210,210,0.0) 0%, rgba(210,210,210,0.20) 100%); }
  .clock-line.right { background: linear-gradient(90deg, rgba(210,210,210,0.20) 0%, rgba(210,210,210,0.0) 100%); }
  .module-well { background: rgba(16,19,18,0.45); border-left: 1px solid rgba(54,59,58,0.20); border-right: 1px solid rgba(54,59,58,0.20); border-top: none; border-bottom: none; display: flex; align-items: center; height: 36px; padding: 0 2px; }
  .modules { display: flex; align-items: center; }
  .module { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #999a95; padding: 0 8px; display: flex; align-items: center; gap: 4px; height: 36px; position: relative; }
  .module .mod-icon { width: 14px; height: 14px; flex-shrink: 0; }
  .module.intellect .mod-icon { color: rgba(91,192,214,0.7); } .module.psyche .mod-icon { color: rgba(117,85,198,0.7); } .module.physique .mod-icon { color: rgba(203,69,106,0.7); } .module.motorics .mod-icon { color: rgba(227,186,62,0.7); }
  .module::after { content: ''; position: absolute; bottom: 4px; left: 8px; right: 8px; height: 2px; border-radius: 1px; }
  .module.intellect::after { background: rgba(91,192,214,0.35); } .module.psyche::after { background: rgba(117,85,198,0.35); } .module.physique::after { background: rgba(203,69,106,0.35); } .module.motorics::after { background: rgba(227,186,62,0.35); }
  .action-icons { display: flex; align-items: center; }
  .bar-icon-btn { display: flex; align-items: center; justify-content: center; width: 30px; height: 36px; color: #999a95; } .bar-icon-btn svg { width: 16px; height: 16px; }

  /* ── Dim overlay ── */
  .dim {
    position: absolute; inset: 0;
    background: rgba(10, 12, 11, 0.55);
    display: flex; justify-content: center; align-items: center;
    padding-bottom: 6%;
    z-index: 20;
  }

  /* ── Power menu panel ── */
  .pm-panel {
    min-width: 280px;
    background: rgba(10, 12, 11, 0.78);
    backdrop-filter: blur(20px);
    padding: 10px 8px;
    position: relative;
    border-left: 3px solid rgba(210, 210, 210, 0.22);
    border-bottom: 2px solid rgba(210, 210, 210, 0.18);
    border-top: 1px solid rgba(54, 59, 58, 0.20);
    border-right: 1px solid rgba(54, 59, 58, 0.20);
  }

  .banner-eroded {
    font-family: 'Open Sans Condensed', sans-serif; font-weight: 700;
    text-transform: uppercase; letter-spacing: 2px; font-size: 14px;
    color: #171b1a; background: #999a95; padding: 3px 12px;
    display: inline-block; overflow: hidden; position: relative;
    margin-left: -11px; margin-bottom: 8px;
  }
  .banner-eroded::before { content: ''; position: absolute; inset: -2px; background: #d2d2d2; filter: url(#erode); }
  .banner-eroded span { position: relative; z-index: 1; }

  .sep-h { height: 1px; width: 100%; background: linear-gradient(90deg, rgba(210,210,210,0.0) 0%, rgba(210,210,210,0.10) 20%, rgba(210,210,210,0.10) 80%, rgba(210,210,210,0.0) 100%); margin: 6px 0; }

  .pm-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; margin: 2px 0;
    cursor: pointer; background: transparent;
    transition: background 0.1s ease;
    border-left: 3px solid transparent;
  }
  .pm-item:hover { background: rgba(40, 44, 43, 0.5); }

  .pm-item.selected {
    border-left: 3px solid #d2d2d2;
    background: rgba(40, 44, 43, 0.4);
    padding-left: 9px;
  }
  .pm-item.selected.danger {
    border-left-color: #b83a3a;
  }

  .pm-icon { width: 16px; height: 16px; color: #999a95; flex-shrink: 0; }
  .pm-icon svg { width: 16px; height: 16px; }

  .pm-label {
    font-family: 'Open Sans Condensed', sans-serif;
    font-weight: 700; font-size: 14px;
    letter-spacing: 1px; text-transform: uppercase;
    color: #ccc8c2;
  }

  .pm-item.danger .pm-label { color: #999a95; }
  .pm-item.danger .pm-icon { color: #4b4b4b; }
  .pm-item.danger:hover .pm-label { color: #ccc8c2; }
  .pm-item.danger:hover .pm-icon { color: #999a95; }

  .pm-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: #363b3a;
    padding: 6px 12px 0;
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="erode" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="4" seed="11" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<div class="desktop">
  <div class="bar"><div class="bar-left"><div class="ws-well"><div class="ws-diamond"><div class="diamond"></div></div><div class="ws-diamond active"><div class="diamond"></div></div><div class="ws-diamond"><div class="diamond"></div></div><div class="ws-diamond"><div class="diamond"></div></div><div class="ws-diamond"><div class="diamond"></div></div></div><div class="sep-light-v"></div><div class="window-title">kitty — ~/my-rice</div></div><div class="bar-center"><div class="sep-light-v"></div><div class="clock-ornament"><div class="clock-line"></div><div class="clock">Wed 02 Apr, 14:30</div><div class="clock-line right"></div></div><div class="sep-light-v"></div></div><div class="bar-right"><div class="module-well"><div class="modules"><div class="module intellect"><svg class="mod-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="16" height="16" rx="2"/></svg><span>12%</span></div><div class="module psyche"><svg class="mod-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>34%</span></div><div class="module physique"><svg class="mod-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg><span>72%</span></div><div class="module motorics"><svg class="mod-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"/><line x1="23" y1="13" x2="23" y2="11"/></svg><span>85%</span></div></div></div><div class="sep-light-v"></div><div class="action-icons"><div class="bar-icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div><div class="bar-icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div><div class="bar-icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg></div></div></div></div>

  <div class="dim">
    <div class="pm-panel">
      <div class="banner-eroded"><span>SESSION</span></div>
      <div class="pm-item selected"><div class="pm-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div><span class="pm-label">LOCK</span></div>
      <div class="pm-item"><div class="pm-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a5 5 0 0 0-10 0"/><line x1="12" y1="2" x2="12" y2="9"/><line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/><line x1="1" y1="18" x2="3" y2="18"/><line x1="21" y1="18" x2="23" y2="18"/><line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/><line x1="23" y1="22" x2="1" y2="22"/></svg></div><span class="pm-label">SUSPEND</span></div>
      <div class="pm-item"><div class="pm-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div><span class="pm-label">LOGOUT</span></div>
      <div class="sep-h"></div>
      <div class="pm-item danger"><div class="pm-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></div><span class="pm-label">REBOOT</span></div>
      <div class="pm-item danger"><div class="pm-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg></div><span class="pm-label">SHUTDOWN</span></div>
      <div class="pm-hint">esc to cancel · enter to confirm</div>
    </div>
  </div>
</div>

</body>
</html>
