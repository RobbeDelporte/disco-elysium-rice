# Tuxedo laptop monitor config
# Adjust resolution and position after first boot with:
#   hyprctl monitors    (to see connected monitors and names)
#   nwg-displays        (GUI tool to arrange them)

# Built-in display — auto-detect resolution
monitor = eDP-1, preferred, auto, 1

# External monitor — auto-detect, placed to the right
monitor = , preferred, auto-right, 1
